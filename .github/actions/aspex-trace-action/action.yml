name: "Onyx Agent Trace"
description: "Audit MCP agent activity from stored log artifacts and flag anomalies."
author: "Onyx Security"

branding:
  icon: activity
  color: purple

inputs:
  version:
    description: "Version of aspex-trace to use"
    required: false
    default: "latest"
  logs-path:
    description: "Path to a directory containing MCP log files to analyze"
    required: false
    default: ""
  client:
    description: "Filter to one client (claude, cursor)"
    required: false
    default: ""
  since:
    description: "How far back to look (e.g. 24h, 7d)"
    required: false
    default: "24h"
  fail-on:
    description: "Fail the action if flagged events at or above this severity (critical, high, medium, low)"
    required: false
    default: "high"

outputs:
  flagged:
    description: "Number of flagged events"
    value: ${{ steps.trace.outputs.flagged }}

runs:
  using: composite
  steps:
    - name: Install aspex-trace
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        VERSION="$INPUT_VERSION"
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
        if [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi

        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh release view --repo aspex-security/aspex --json tagName -q '.tagName' | sed 's/^v//')
        fi

        ASSET="aspex-trace_${OS}_${ARCH}.tar.gz"
        URL="https://github.com/aspex-security/aspex/releases/download/v${VERSION}/${ASSET}"

        # Download to a temp file, verify checksum, then install.
        TMP=$(mktemp)
        curl -fsSL "$URL" -o "$TMP"

        CHECKSUMS_TMP=$(mktemp)
        curl -fsSL "https://github.com/aspex-security/aspex/releases/download/v${VERSION}/checksums.txt" -o "$CHECKSUMS_TMP"
        EXPECTED=$(grep " ${ASSET}$" "$CHECKSUMS_TMP" | awk '{print $1}')
        ACTUAL=$(sha256sum "$TMP" | awk '{print $1}')
        rm -f "$CHECKSUMS_TMP"
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "Checksum mismatch for ${ASSET}: expected=${EXPECTED} actual=${ACTUAL}"
          rm -f "$TMP"
          exit 1
        fi

        tar -xz -C /usr/local/bin -f "$TMP"
        rm -f "$TMP"
        chmod +x /usr/local/bin/aspex-trace

    - name: Run aspex-trace
      id: trace
      shell: bash
      # Pass all user-controlled inputs via environment variables, not direct
      # interpolation, to prevent command injection via shell metacharacters.
      env:
        INPUT_SINCE: ${{ inputs.since }}
        INPUT_CLIENT: ${{ inputs.client }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Use an array so each flag value is a distinct argument (no word-splitting).
        ARGS=(--json --since "$INPUT_SINCE")
        if [ -n "$INPUT_CLIENT" ]; then ARGS+=(--client "$INPUT_CLIENT"); fi

        set +e
        RESULT=$(aspex-trace "${ARGS[@]}" 2>&1)
        EXIT=$?
        set -e

        echo "$RESULT" > trace-result.json

        FLAGGED=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('flagged', [])))" 2>/dev/null || echo "0")
        echo "flagged=$FLAGGED" >> "$GITHUB_OUTPUT"

        echo "### Onyx Agent Trace Results" >> "$GITHUB_STEP_SUMMARY"
        echo "Flagged events: $FLAGGED" >> "$GITHUB_STEP_SUMMARY"

        if [ "$EXIT" -ne 0 ] && [ "$INPUT_FAIL_ON" != "none" ]; then
          echo "Trace found flagged events at or above --fail-on=$INPUT_FAIL_ON."
          exit 1
        fi
