name: "Onyx MCP Scan"
description: "Scan MCP server configurations for security risks and upload SARIF results."
author: "Onyx Security"

branding:
  icon: shield
  color: purple

inputs:
  version:
    description: "Version of aspex-scan to use"
    required: false
    default: "latest"
  config:
    description: "Path to a specific MCP config file to scan"
    required: false
    default: ""
  fail-on:
    description: "Fail the action if findings at or above this severity are found (critical, high, medium, low)"
    required: false
    default: "high"
  no-exec:
    description: "Static analysis only; do not launch MCP servers"
    required: false
    default: "false"
  upload-sarif:
    description: "Upload SARIF results to GitHub code scanning"
    required: false
    default: "true"

outputs:
  score:
    description: "Overall setup score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  band:
    description: "Risk band (HEALTHY, NEEDS REVIEW, AT RISK, HIGH RISK)"
    value: ${{ steps.scan.outputs.band }}

runs:
  using: composite
  steps:
    - name: Install aspex-scan
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        VERSION="$INPUT_VERSION"
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
        if [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi

        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh release view --repo aspex-security/aspex --json tagName -q '.tagName' | sed 's/^v//')
        fi

        ASSET="aspex-scan_${OS}_${ARCH}.tar.gz"
        URL="https://github.com/aspex-security/aspex/releases/download/v${VERSION}/${ASSET}"

        # Download to a temp file, verify checksum, then install.
        TMP=$(mktemp)
        curl -fsSL "$URL" -o "$TMP"

        CHECKSUMS_TMP=$(mktemp)
        curl -fsSL "https://github.com/aspex-security/aspex/releases/download/v${VERSION}/checksums.txt" -o "$CHECKSUMS_TMP"
        EXPECTED=$(grep " ${ASSET}$" "$CHECKSUMS_TMP" | awk '{print $1}')
        ACTUAL=$(sha256sum "$TMP" | awk '{print $1}')
        rm -f "$CHECKSUMS_TMP"
        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "Checksum mismatch for ${ASSET}: expected=${EXPECTED} actual=${ACTUAL}"
          rm -f "$TMP"
          exit 1
        fi

        tar -xz -C /usr/local/bin -f "$TMP"
        rm -f "$TMP"
        chmod +x /usr/local/bin/aspex-scan

    - name: Run aspex-scan
      id: scan
      shell: bash
      # Pass all user-controlled inputs via environment variables, not direct
      # interpolation, to prevent command injection via shell metacharacters.
      env:
        INPUT_NO_EXEC: ${{ inputs.no-exec }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Use an array so each flag value is a distinct argument (no word-splitting).
        ARGS=(--json)
        if [ "$INPUT_NO_EXEC" = "true" ]; then ARGS+=(--no-exec); fi
        if [ -n "$INPUT_CONFIG" ]; then ARGS+=(--config "$INPUT_CONFIG"); fi

        set +e
        RESULT=$(aspex-scan "${ARGS[@]}" 2>&1)
        EXIT=$?
        set -e

        echo "$RESULT" > scan-result.json

        SCORE=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['overall']['Score'])" 2>/dev/null || echo "0")
        BAND=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['overall']['Band'])" 2>/dev/null || echo "UNKNOWN")

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "band=$BAND" >> "$GITHUB_OUTPUT"

        echo "### Onyx MCP Scan Results" >> "$GITHUB_STEP_SUMMARY"
        echo "| Score | Band |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
        echo "| $SCORE / 100 | $BAND |" >> "$GITHUB_STEP_SUMMARY"

        if [ "$EXIT" -ne 0 ] && [ "$INPUT_FAIL_ON" != "none" ]; then
          echo "Scan found findings at or above --fail-on=$INPUT_FAIL_ON."
          exit 1
        fi
