name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — CI only needs to read repo contents.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache: true

      - name: Build aspex-scan
        run: go build -o /dev/null ./cmd/aspex-scan

      - name: Build aspex-trace
        run: go build -o /dev/null ./cmd/aspex-trace

      - name: Build aspex
        run: go build -o /dev/null ./cmd/aspex

      - name: Build aspex-attack
        run: go build -o /dev/null ./cmd/aspex-attack

      - name: Build aspex-doctor
        run: go build -o /dev/null ./cmd/aspex-doctor

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
